name: Daily job run

on:
  schedule:
    # 02:30 UTC = 08:00 IST — adjust to your morning.
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Restore job database (24h dedupe memory)
        uses: actions/cache@v4
        with:
          path: job_agent.db
          key: job-db-${{ github.run_id }}
          restore-keys: job-db-
      - name: Load personal task log from TASKLOG secret (if set)
        env:
          TASKLOG: ${{ secrets.TASKLOG }}
        run: |
          if [ -n "$TASKLOG" ]; then
            printf '%s\n' "$TASKLOG" > tasklog.txt
            echo "Using personal task log from the TASKLOG secret"
          else
            echo "TASKLOG secret not set; using the template tasklog.txt"
          fi
      - name: Build profile
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py build-profile
      - name: Daily run
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
        run: python main.py run
      - name: Upload digest and application packages
        uses: actions/upload-artifact@v4
        with:
          name: daily-output-${{ github.run_id }}
          path: |
            digests/
            applications/
      - name: Assemble public site (setup page + digest, no personal files)
        run: |
          mkdir -p _site
          cp site/index.html _site/
          cp digests/*.html _site/ 2>/dev/null || true
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  publish:
    needs: daily
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
