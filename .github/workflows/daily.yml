name: Daily job run

on:
  schedule:
    # 02:30 UTC = 08:00 IST — adjust to your morning.
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Restore job database (24h dedupe memory)
        uses: actions/cache@v4
        with:
          path: job_agent.db
          key: job-db-${{ github.run_id }}
          restore-keys: job-db-
      - name: Load personal task log from TASKLOG secret
        env:
          TASKLOG: ${{ secrets.TASKLOG }}
        run: |
          if [ -z "$TASKLOG" ]; then
            echo "::error::TASKLOG secret is required; refusing to generate placeholder resumes"
            exit 1
          fi
          printf '%s\n' "$TASKLOG" > tasklog.txt
          echo "Using personal task log from the TASKLOG secret"
      - name: Build profile
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py build-profile
      - name: Daily run
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
        run: python main.py run
      - name: Encrypt private daily output
        id: encrypt
        env:
          RESUME_ARCHIVE_PASSWORD: ${{ secrets.RESUME_ARCHIVE_PASSWORD }}
        run: |
          if [ -z "$RESUME_ARCHIVE_PASSWORD" ]; then
            echo "No encrypted artifact requested; configure RESUME_ARCHIVE_PASSWORD to enable one"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          tar -czf private-daily-output.tar.gz applications/ digests/
          openssl enc -aes-256-cbc -salt -pbkdf2 -iter 200000 \
            -pass env:RESUME_ARCHIVE_PASSWORD \
            -in private-daily-output.tar.gz \
            -out private-daily-output.tar.gz.enc
          rm -f private-daily-output.tar.gz
          echo "created=true" >> "$GITHUB_OUTPUT"
      - name: Upload encrypted private output
        if: steps.encrypt.outputs.created == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: encrypted-daily-output-${{ github.run_id }}
          path: private-daily-output.tar.gz.enc
          retention-days: 7
          if-no-files-found: error
      - name: Assemble public site (setup page + digest, no personal files)
        if: vars.PUBLISH_DIGEST == 'true'
        run: |
          mkdir -p _site
          cp site/index.html _site/
          cp digests/*.html _site/ 2>/dev/null || true
      - name: Upload Pages artifact
        if: vars.PUBLISH_DIGEST == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  publish:
    if: vars.PUBLISH_DIGEST == 'true'
    needs: daily
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
